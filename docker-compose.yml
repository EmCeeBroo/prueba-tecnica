version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: logyca_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: logyca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logyca_net

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: logyca_azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0"
    networks:
      - logyca_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: logyca_api
    environment:
      MODE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: logyca_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      CONTAINER_NAME: sales-csv
      QUEUE_NAME: sales-queue
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - azurite
    networks:
      - logyca_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: logyca_worker
    environment:
      MODE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: logyca_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      CONTAINER_NAME: sales-csv
      QUEUE_NAME: sales-queue
    depends_on:
      - postgres
      - azurite
    networks:
      - logyca_net

networks:
  logyca_net:
    driver: bridge

volumes:
  postgres_data: