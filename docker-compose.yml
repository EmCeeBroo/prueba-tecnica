version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: logyca_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: logyca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logyca_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: logyca_azurite
    ports:
      - "10000:10000"
      - "10001:10001"
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0"
    networks:
      - logyca_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: logyca_api
    environment:
      MODE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: logyca_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      CONTAINER_NAME: sales-csv
      QUEUE_NAME: sales-queue
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    networks:
      - logyca_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: logyca_worker
    environment:
      MODE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: logyca_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      CONTAINER_NAME: sales-csv
      QUEUE_NAME: sales-queue
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    networks:
      - logyca_net

  n8n:
    image: n8nio/n8n
    container_name: logyca_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=logyca_db
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=secret
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - logyca_net

networks:
  logyca_net:
    driver: bridge

volumes:
  postgres_data:
  n8n_data: